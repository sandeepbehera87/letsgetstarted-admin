<div class="login-form">
  <div class="login-header">
    <h2 class="login-title">Welcome back</h2>
    <p class="login-subtitle">Sign in to manage question sets for your students.</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="login()">
    <div class="form-group">
      <label class="field-label" for="login-user-id">Email or user ID</label>
      <input
        id="login-user-id"
        type="text"
        formControlName="userId"
        class="form-control"
        placeholder="Enter your email or user id"
        [class.is-invalid]="submitted && f['userId'].errors"
      />
    </div>

    <div class="form-group">
      <label class="field-label" for="login-password">Password</label>
      <input
        id="login-password"
        type="password"
        formControlName="password"
        class="form-control"
        placeholder="Enter your password"
        [class.is-invalid]="submitted && f['password'].errors"
      />
    </div>

    <div class="form-actions">
      <button
        type="submit"
        class="btn btn-login"
        [disabled]="loginForm.pristine || loginForm.invalid"
      >
        Sign in
      </button>
    </div>

    <p class="signup-hint">
      New here?
      <button type="button" class="link-btn" (click)="signUp()">Create an account</button>
    </p>
  </form>
</div>
