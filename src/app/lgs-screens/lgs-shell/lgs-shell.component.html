<div class="app-layout">
  <lgs-navbar></lgs-navbar>

  <div class="dashboard-tabs-wrapper" *ngIf="showTabs">
    <div class="dashboard-tabs-inner">
      <nav class="dashboard-tabs" aria-label="Questions navigation">
        <button
          *ngFor="let tab of tabs"
          type="button"
          class="dashboard-tab"
          role="tab"
          [attr.aria-selected]="isActive(tab)"
          [class.active]="isActive(tab)"
          (click)="navClick(tab.path)"
        >
          <span class="dashboard-tab-icon" aria-hidden="true">{{ tab.icon }}</span>
          <span class="dashboard-tab-label">{{ tab.label }}</span>
        </button>
      </nav>
    </div>
  </div>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <span>© Lets Get Started</span>
  </footer>
</div>
