<header class="app-header">
  <nav class="navbar navbar-expand-md app-header-nav">
    <div class="container-fluid app-header-inner">
      <a class="navbar-brand app-brand" (click)="goHome()">
        <span class="app-logo-slot">
          <img
            src="assets/logo.png"
            alt="Lets Get Started logo"
            class="app-logo"
            width="88"
            height="48"
            decoding="sync"
            fetchpriority="high"
          />
        </span>
        <span class="app-brand-text">Lets Get Started</span>
      </a>

      <ng-container *ngIf="auth$ | async as auth">
        <div class="app-header-right" *ngIf="auth.isLoggedIn">
          <span class="app-user-greeting">Welcome, {{ auth.userId }}</span>
          <button
            type="button"
            class="app-logout-btn"
            aria-label="Logout"
            [disabled]="isLoggingOut"
            (click)="logout()"
          >
            <img src="assets/sign-out.png" alt="" class="app-logout-icon" aria-hidden="true" />
            <span>Logout</span>
          </button>
        </div>
      </ng-container>
    </div>
  </nav>
</header>
