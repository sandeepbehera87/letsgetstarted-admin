<div class="add-questions-page">
  <header class="page-header">
    <span class="page-badge">Create new</span>
    <h1 class="page-title">Add question set</h1>
    <p class="page-subtitle">
      Build a multiple-choice question set by adding one question at a time.
    </p>
  </header>

  <div class="form-card">
    <form [formGroup]="questionFrom" class="question-form">
      <section class="form-section">
        <h2 class="section-title">Course details</h2>
        <div class="field-grid">
          <div class="form-group">
            <label class="field-label" for="coursename">Course name</label>
            <input
              type="text"
              class="form-control"
              id="coursename"
              formControlName="coursename"
              placeholder="e.g. Class 3"
              required
            />
          </div>
          <div class="form-group">
            <label class="field-label" for="subjectname">Subject</label>
            <input
              type="text"
              class="form-control"
              id="subjectname"
              formControlName="subjectname"
              placeholder="e.g. Mathematics"
              required
            />
          </div>
        </div>
      </section>

      <section class="form-section question-section" formGroupName="question">
        <h2 class="section-title">Question</h2>

        <div class="form-group">
          <label class="field-label" for="quetionTitle">Question text</label>
          <input
            type="text"
            class="form-control"
            id="quetionTitle"
            formControlName="quetionTitle"
            placeholder="Enter the question here"
            required
          />
        </div>

        <div class="field-grid">
          <div class="form-group">
            <label class="field-label" for="option1">Option 1</label>
            <input
              type="text"
              class="form-control"
              id="option1"
              formControlName="option1"
              placeholder="First answer choice"
              required
            />
          </div>
          <div class="form-group">
            <label class="field-label" for="option2">Option 2</label>
            <input
              type="text"
              class="form-control"
              id="option2"
              formControlName="option2"
              placeholder="Second answer choice"
              required
            />
          </div>
          <div class="form-group">
            <label class="field-label" for="option3">Option 3</label>
            <input
              type="text"
              class="form-control"
              id="option3"
              formControlName="option3"
              placeholder="Third answer choice"
              required
            />
          </div>
          <div class="form-group">
            <label class="field-label" for="option4">Option 4</label>
            <input
              type="text"
              class="form-control"
              id="option4"
              formControlName="option4"
              placeholder="Fourth answer choice"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="field-label" for="correctAnswer">Correct answer</label>
          <input
            type="text"
            class="form-control"
            id="correctAnswer"
            formControlName="correctAnswer"
            placeholder="Must match one of the options above"
            required
          />
        </div>
      </section>

      <div class="set-summary" *ngIf="questionSet.length > 0">
        <span class="set-count">{{ questionSet.length }} {{ questionSet.length === 1 ? 'question' : 'questions' }} in set</span>
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="btn btn-amber add-to-set"
          (click)="addNewQuestion()"
          [disabled]="questionFrom.pristine || questionFrom.controls['question'].invalid"
        >
          Add to set
        </button>
        <button
          type="button"
          class="btn btn-outline reset"
          (click)="resetQuestion()"
          [disabled]="questionFrom.controls['question'].pristine"
        >
          Reset
        </button>
        <button
          type="submit"
          class="btn btn-primary submit"
          [disabled]="questionFrom.pristine || questionFrom.invalid || isSubmitting"
          (click)="submitQuestionSet()"
        >
          {{ isSubmitting ? 'Saving...' : 'Submit set' }}
        </button>
      </div>
    </form>
  </div>
</div>
