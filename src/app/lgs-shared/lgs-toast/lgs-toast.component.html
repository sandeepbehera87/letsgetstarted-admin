<div
  *ngIf="toast"
  class="lgs-toast"
  [class.lgs-toast-error]="toast.type === 'error'"
  [class.lgs-toast-success]="toast.type === 'success'"
  role="alert"
  aria-live="assertive"
>
  <span class="lgs-toast-icon" aria-hidden="true">{{ toast.type === 'success' ? '✓' : '!' }}</span>
  <p class="lgs-toast-message">{{ toast.message }}</p>
  <button type="button" class="lgs-toast-close" aria-label="Dismiss" (click)="dismiss()">×</button>
</div>
