<div *ngIf="visible" class="modal" tabindex="-1" role="dialog" (click)="hide()">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title pull-left">{{title}}</h4>
        <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="hide()">
          <span aria-hidden="true" class="visually-hidden">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <p>{{message}}</p>
        <ng-content></ng-content>
      </div>
      <div class="modal-footer">
        <button *ngIf="closeBtnName" type="button" class="btn btn-default button-close" (click)="hide()">{{closeBtnName}}</button>
        <button *ngIf="confirmBtnName" type="button" class="btn btn-defaul button-confirm" (click)="onConfirmClick($event)">{{confirmBtnName}}</button>
      </div>
    </div>
  </div>
</div>
